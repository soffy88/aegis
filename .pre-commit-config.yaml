repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-added-large-files
        args: ['--maxkb=500']

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.13
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: local
    hooks:
      - id: no-codename
        name: "guard: no internal codenames"
        language: script
        entry: scripts/check_no_codename.sh
        pass_filenames: false

      - id: no-hardcoded-path-ctor
        name: "guard: no hardcoded system Path() constructors"
        language: script
        entry: scripts/check_no_hardcoded_path.sh
        pass_filenames: false

      - id: no-inline-secret
        name: "guard: no inline API key literals"
        language: script
        entry: scripts/check_no_inline_secret.sh
        pass_filenames: false
