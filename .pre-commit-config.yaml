repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-added-large-files
        args: ['--maxkb=500']
        exclude: '^uv\.lock$'

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.13
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: local
    hooks:
      - id: no-codename
        name: "guard: no internal codenames"
        language: script
        entry: scripts/check_no_codename.sh
        pass_filenames: false

      - id: no-hardcoded-path-ctor
        name: "guard: no hardcoded system Path() constructors"
        language: script
        entry: scripts/check_no_hardcoded_path.sh
        pass_filenames: false

      - id: no-inline-secret
        name: "guard: no inline API key literals"
        language: script
        entry: scripts/check_no_inline_secret.sh
        pass_filenames: false

      # DESIGN.md 附录 B 符合性矩阵 — CI 类门禁
      - id: design-c42-loop-idempotent
        name: "design C-4.2: 编排循环幂等锚点"
        language: script
        entry: scripts/check_loop_idempotent.sh
        pass_filenames: false

      - id: design-ci8-outbox-idempotent
        name: "design C-I8: outbox 原子领取锚点"
        language: script
        entry: scripts/check_outbox_consumer_idempotent.sh
        pass_filenames: false

      - id: design-c9c-skip-baseline
        name: "design C-9c: skip 不增长且带 reason"
        language: script
        entry: scripts/check_skip_baseline.sh
        pass_filenames: false

      - id: design-ci6-telemetry-retention
        name: "design C-I6: 遥测保留登记表"
        language: script
        entry: scripts/check_telemetry_retention.sh
        pass_filenames: false
