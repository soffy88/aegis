# Aegis prod stack — helios-net 共享网络
# 依赖外部服务: platform-postgres (helios-net), helios-redis (helios-net)
# 外网入口: cloudflared → aegis-caddy → aegis-backend / aegis-console

services:

  aegis-backend:
    image: aegis-backend:${AEGIS_VERSION:-latest}
    container_name: aegis-backend
    restart: unless-stopped
    environment:
      # === 运行环境 ===
      AEGIS_ENV: prod
      ENV: prod
      AEGIS_VERSION: ${AEGIS_VERSION:-latest}

      # === 数据库 (platform-postgres, helios-net 内) ===
      AEGIS_POSTGRES_DSN: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@platform-postgres:5432/aegis
      AEGIS_POSTGRES_POOL_MIN: "2"
      AEGIS_POSTGRES_POOL_MAX: "10"

      # === Redis (helios-redis, helios-net 内) ===
      AEGIS_REDIS_URL: redis://infisical-redis:6379/2

      # === JWT ===
      AEGIS_JWT_SECRET: ${AEGIS_JWT_SECRET:?required}
      AEGIS_JWT_REFRESH_SECURE: "true"
      AEGIS_JWT_ACCESS_TTL_MINUTES: "60"
      AEGIS_JWT_REFRESH_TTL_DAYS: "30"

      # === CORS ===
      AEGIS_CORS_ALLOWED_ORIGINS: ${AEGIS_CORS_ALLOWED_ORIGINS:-https://aegis.uex.hk}

      # === 数据目录 ===
      AEGIS_DATA_DIR: /data/aegis

      # === Docker socket (容器管理) ===
      AEGIS_DOCKER_HOST: unix:///var/run/docker.sock

      # === Caddy 反代管理 ===
      AEGIS_CADDY_ADMIN_URL: http://aegis-caddy:2019

      # === LLM (Brain / RCA, 可选) ===
      AEGIS_LLM_PROVIDER: ${AEGIS_LLM_PROVIDER:-anthropic}
      AEGIS_LLM_MODEL_DEFAULT: ${AEGIS_LLM_MODEL_DEFAULT:-claude-haiku-4-5}
      AEGIS_LLM_MODEL_PREMIUM: ${AEGIS_LLM_MODEL_PREMIUM:-claude-sonnet-4-6}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}

      # === Embedding (RAG Runbook 检索, 可选) ===
      AEGIS_EMBEDDING_PROVIDER: ${AEGIS_EMBEDDING_PROVIDER:-default}
      AEGIS_RUNBOOK_VECTOR_DIM: ${AEGIS_RUNBOOK_VECTOR_DIM:-1024}

      # === Ollama (host 上 systemd 管理, GPU 独占) — aegis 接管为唯一网关，其它项目
      # MUST 经 aegis /api/v1/llm/ollama/* 调用，不得各自直连 GPU（避免多进程抢卡）。
      AEGIS_OLLAMA_BASE_URL: ${AEGIS_OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      AEGIS_OLLAMA_GATEWAY_MAX_CONCURRENCY: ${AEGIS_OLLAMA_GATEWAY_MAX_CONCURRENCY:-1}
      # Shared secret for the GPU-lock / Ollama gateway exposed on 127.0.0.1:8010.
      # REQUIRED in prod: while empty the gateway fails closed (503) — set it in
      # .env.aegis (openssl rand -hex 32) and have host-native callers send
      # Authorization: Bearer $AEGIS_OLLAMA_GATEWAY_TOKEN.
      AEGIS_OLLAMA_GATEWAY_TOKEN: ${AEGIS_OLLAMA_GATEWAY_TOKEN:-}

      # === AutoHeal ===
      AEGIS_AUTOHEAL_ENABLED: ${AEGIS_AUTOHEAL_ENABLED:-true}
      AEGIS_AUTOHEAL_DRY_RUN: ${AEGIS_AUTOHEAL_DRY_RUN:-false}

      # === Backup / S3 (可选) ===
      AEGIS_BACKUP_S3_BUCKET: ${AEGIS_BACKUP_S3_BUCKET:-}
      AEGIS_BACKUP_S3_ENDPOINT_URL: ${AEGIS_BACKUP_S3_ENDPOINT_URL:-}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
      AEGIS_BACKUP_S3_REGION: ${AEGIS_BACKUP_S3_REGION:-us-east-1}

      # === 邮件 (Resend, 可选) ===
      AEGIS_RESEND_API_KEY: ${AEGIS_RESEND_API_KEY:-}
      AEGIS_EMAIL_FROM_ADDR: ${AEGIS_EMAIL_FROM_ADDR:-noreply@aegis.uex.hk}

      # === 自监控 ===
      AEGIS_SENTRY_ENABLED: ${AEGIS_SENTRY_ENABLED:-false}
      AEGIS_SENTRY_DSN: ${AEGIS_SENTRY_DSN:-}

      # === 可观测性外置组件 (helios-net 内直连) ===
      AEGIS_LOKI_URL: ${AEGIS_LOKI_URL:-http://aegis-loki:3100}
      AEGIS_PYROSCOPE_URL: ${AEGIS_PYROSCOPE_URL:-http://aegis-pyroscope:4040}
      AEGIS_KUBECONFIG: ${AEGIS_KUBECONFIG:-/data/aegis/kubeconfig}

      # === Plan (自托管默认 enterprise) ===
      AEGIS_SELF_HOSTED_MODE: "true"
      AEGIS_DEFAULT_ORG_PLAN: enterprise

      # === Agent token ===
      AEGIS_AGENT_TOKEN: ${AEGIS_AGENT_TOKEN:-}

      # === 文件管理器白名单（宿主机目录，冒号分隔）===
      # 必须与下方 volumes 里 bind-mount 的宿主机目录一致（同路径挂载）。
      AEGIS_FILE_MANAGER_ROOTS: ${AEGIS_FILE_MANAGER_ROOTS:-/data:/mnt/d}

    volumes:
      # Docker socket — 容器管理核心
      - /var/run/docker.sock:/var/run/docker.sock:ro
      # 持久化数据：备份/向量库/Runbook
      - aegis-data:/data/aegis
      - /home/soffy/projects/aegis/aegis-appstore/apps:/data/aegis-appstore/apps:ro
      # 文件管理器白名单根（同路径挂载，读写）——须与 AEGIS_FILE_MANAGER_ROOTS 一致
      - /data:/data
      - /mnt/d:/mnt/d
      # 宿主机 /proc 只读 —— 仅用于把 nvidia-smi 报告的 GPU 进程 PID 解析回容器名
      # (读 /proc/<pid>/cgroup),不用于其它用途。见 services/gpu_processes.py。
      - /proc:/host/proc:ro

    networks:
      # Extra stack networks so the uptime prober can reach those stacks' health
      # endpoints (read-only HTTP probing). Reversible: remove a network to stop
      # probing that stack internally.
      - helios-net
      - stratum-net
      - hevi-cftunnel_default

    # host.docker.internal isn't set up by default on Linux Docker — needed to reach
    # the host-level systemd `ollama` service (GPU, port 11434) for the LLM gateway.
    extra_hosts:
      - "host.docker.internal:host-gateway"

    # 仅回环可达 —— 让 host 上原生进程(如 stratum/aii 的 ensure_container())能调 GPU 锁
    # API(/api/v1/gpu/lock/*),不对外网暴露(公网入口仍只有 aegis-caddy 的 80/443)。
    # 容器内仍监听 8000;host 侧用 8010,因为 8000 已被 mneme-api-1 占用。
    ports:
      - "127.0.0.1:8010:8000"

    depends_on:
      aegis-caddy:
        condition: service_healthy

    # Readiness (not liveness): /health/ready does a real SELECT 1, so dependents
    # gated on service_healthy only start once the backend can actually serve DB
    # traffic. (The Dockerfile HEALTHCHECK stays on liveness /health so a transient
    # DB blip doesn't trigger a container restart.)
    healthcheck:
      test: ["CMD", "python", "-c",
        "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/health/ready', timeout=3).read()"]
      interval: 30s
      timeout: 5s
      start_period: 30s
      retries: 3

    # Give the lifespan shutdown (cancel cron/website loops → drain in-flight →
    # close_pool) time to finish before SIGKILL. Pairs with uvicorn's
    # --timeout-graceful-shutdown in the Dockerfile CMD.
    stop_grace_period: 30s

    # 非 root 用户 (uid 10001) 需要 docker.sock 的属组才能管理容器。
    # 设为宿主机的: stat -c '%g' /var/run/docker.sock
    group_add:
      - "${AEGIS_DOCKER_GID:-988}"
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          memory: 1536M
          cpus: "2.0"
        reservations:
          memory: 256M

  aegis-console:
    image: aegis-console:${AEGIS_VERSION:-latest}
    container_name: aegis-console
    restart: unless-stopped
    environment:
      NODE_ENV: production
      # API 地址（容器内通过 helios-net 直连后端）
      NEXT_PUBLIC_AEGIS_API: ${NEXT_PUBLIC_AEGIS_API:-https://aegis.uex.hk}
    networks:
      - helios-net
    depends_on:
      aegis-backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://127.0.0.1:3000/"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"

  aegis-caddy:
    image: caddy:2.11.4-alpine
    container_name: aegis-caddy
    restart: unless-stopped
    ports:
      # Public 80/443 for direct-domain websites (Caddy auto-HTTPS via Let's Encrypt).
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - aegis-caddy-data:/data
      - aegis-caddy-config:/config
    networks:
      - helios-net
    healthcheck:
      test: ["CMD", "caddy", "validate", "--config", "/etc/caddy/Caddyfile"]
      interval: 60s
      timeout: 10s
      retries: 3
    security_opt:
      - no-new-privileges:true
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "1.0"

  aegis-cloudflared:
    # 锁定到在产已验证版本 (原为 :latest, 不可复现)
    image: cloudflare/cloudflared:2026.6.0
    container_name: aegis-cloudflared
    restart: unless-stopped
    command: tunnel --no-autoupdate run --token ${CLOUDFLARED_TOKEN:?required}
    networks:
      - helios-net
    depends_on:
      aegis-caddy:
        condition: service_healthy
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "1.0"

  # Container metrics are provided by the shared platform observability stack
  # (obsv-prometheus/obsv-cadvisor/obsv-node-exporter, project `observability`),
  # NOT by an Aegis-local cAdvisor. Aegis ingests them by scraping obsv-prometheus'
  # /federate endpoint over helios-net; the scrape targets ("cadvisor",
  # "node-exporter") live in the scrape_targets table. gcr.io/cadvisor also cannot
  # be pulled on this host and can't read the containerd-snapshotter docker layout.

  # === 可观测性后端 (backend 通过 AEGIS_LOKI_URL / AEGIS_PYROSCOPE_URL 直连) ===
  aegis-loki:
    image: grafana/loki:2.9.8
    container_name: aegis-loki
    restart: unless-stopped
    # 自带配置带 14 天 compactor 保留期 (镜像默认 local-config 无保留会撑爆卷)。
    command: -config.file=/etc/loki/loki-config.yaml
    networks:
      - helios-net
    volumes:
      - aegis-loki-data:/loki
      - ./loki-config.yaml:/etc/loki/loki-config.yaml:ro
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # 日志采集: 通过 Docker 服务发现 tail 所有容器 stdout/stderr → 打 container/stack/service
  # 标签 → 推 aegis-loki。使 Console 的 /loki 页 (LogQL {container="..."}) 有数据。
  aegis-promtail:
    image: grafana/promtail:2.9.8
    container_name: aegis-promtail
    restart: unless-stopped
    command: -config.file=/etc/promtail/config.yml
    networks:
      - helios-net
    volumes:
      - ./promtail-config.yaml:/etc/promtail/config.yml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - aegis-promtail-positions:/tmp
    # 需 docker.sock 属组才能经 Docker API 读容器日志 (非 root)。
    group_add:
      - "${AEGIS_DOCKER_GID:-988}"
    security_opt:
      - no-new-privileges:true
    depends_on:
      - aegis-loki
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  aegis-pyroscope:
    image: grafana/pyroscope:1.9.2
    container_name: aegis-pyroscope
    restart: unless-stopped
    networks:
      - helios-net
    volumes:
      - aegis-pyroscope-data:/data
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # === 链路追踪采集前门 (opt-in, profile=tracing) ===
  # 收各服务的 OTLP (grpc :4317 / http :4318) → 翻译成 aegis 摄取端点要的 OTLP/JSON 转发。
  # 默认不随 `up` 启动；启用: `docker compose --profile tracing up -d aegis-otel-collector`
  # 并在 .env.aegis 设 AEGIS_TRACE_INGEST_ENDPOINT(含 org uuid) + AEGIS_TELEMETRY_INGEST_KEY。
  # 部署前用 `docker run --rm ... otel/opentelemetry-collector:0.116.0 validate` 校验配置。
  aegis-otel-collector:
    image: otel/opentelemetry-collector:0.116.0
    container_name: aegis-otel-collector
    profiles: ["tracing"]
    restart: unless-stopped
    command: ["--config=/etc/otelcol/config.yaml"]
    environment:
      AEGIS_TRACE_INGEST_ENDPOINT: ${AEGIS_TRACE_INGEST_ENDPOINT:-}
      AEGIS_TELEMETRY_INGEST_KEY: ${AEGIS_TELEMETRY_INGEST_KEY:-}
    volumes:
      - ./otel-collector-config.yaml:/etc/otelcol/config.yaml:ro
    networks:
      - helios-net
    security_opt:
      - no-new-privileges:true
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # §3.2 GPU 观测 — 此前 aegis 对 GPU 完全无可见性；多项目共享单张卡时抢占导致的
  # NVML "Unknown Error"（见 2026-07-05 ocr-vllm 崩溃事故）此前无信号可查。
  # --query-field-names 显式指定，避免此驱动版本(595.71)不支持的字段(kmd_version 等)
  # 触发 exporter 自身崩溃；抓取失败(如本次 GPU 故障期间)只表现为空指标，不会崩循环。
  aegis-gpu-exporter:
    image: utkuozdemir/nvidia_gpu_exporter:1.3.1
    container_name: aegis-gpu-exporter
    restart: unless-stopped
    # 共享宿主机 PID namespace —— nvidia-smi 的 --query-compute-apps 进程级查询依赖
    # PID namespace 匹配,没有 pid: host 时驱动能看到显存/利用率(设备级,无关 PID
    # namespace)但看不到任何 GPU 计算进程(见 aegis/server/services/gpu_processes.py)。
    pid: host
    command:
      - "--query-field-names=index,name,uuid,utilization.gpu,utilization.memory,memory.total,memory.used,memory.free,temperature.gpu,power.draw"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    networks:
      - helios-net
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  aegis-caddy-data:
  aegis-caddy-config:
  aegis-data:          # 备份/向量库/Runbook YAML 持久化
  aegis-loki-data:     # Loki 日志块存储
  aegis-promtail-positions: # promtail 读取偏移 (跨重启避免重读历史日志)
  aegis-pyroscope-data: # Pyroscope profile 存储

networks:
  helios-net:
    external: true
  stratum-net:
    external: true
  hevi-cftunnel_default:
    external: true
