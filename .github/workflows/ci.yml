name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Backend Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: aegis
          POSTGRES_PASSWORD: aegis
          POSTGRES_DB: aegis
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"
          cache: pip

      # 私有 3O 依赖 (obase/oprim/oskill/omodul/oservice) 走 git+ssh，CI 必须
      # 注入 deploy key 才能 pip install。在仓库 Settings → Secrets 配置
      # HELIOS_DEPLOY_KEY (对 helios-plat/* 有读权限的私钥) 后此步生效。
      - name: Set up SSH for private deps
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.HELIOS_DEPLOY_KEY }}

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: pre-commit
        run: pre-commit run --all-files

      - name: ruff lint
        run: ruff check aegis/

      - name: ruff format
        run: ruff format --check aegis/

      - name: mypy
        run: mypy aegis/

      - name: 3O Paradigm Compliance Checks (C0d)
        run: |
          set -e
          echo "===== Check 1: no inlined omodul implementations ====="
          ! grep -rn "def install_self_hosted_app\|def upgrade_self_hosted_app\|def backup_app_data\|def triage_signal\|def diagnose_root_cause\|def propose_action_plan\|def generate_incident_postmortem\|def configure_domain_for_app" aegis/server/ --include="*.py"

          echo "===== Check 2: no raw docker SDK (use oprim) ====="
          ! grep -rn "docker.from_env\|DockerClient\|client.containers" aegis/server/ --include="*.py"

          echo "===== Check 3: no parallel 3O package structure ====="
          ! find aegis/ -type d \( -name "oprim*" -o -name "oskill*" -o -name "omodul*" -o -name "obase*" -o -name "_3o*" -o -name "_omodul*" -o -name "_oskill*" \) | grep -v ".venv\|.git\|node_modules"

          echo "===== Check 4: brain.py does not directly import omodul (must use dispatcher) ====="
          ! grep "^from omodul import\|^import omodul" aegis/server/orchestration/brain.py

          echo "All 3O paradigm compliance checks passed."

      - name: aegis-watch isolation check (§8.4)
        run: |
          set -e
          echo "===== aegis-watch must not import 3O main lib ====="
          ! grep -rn "^from oprim\|^from oskill\|^from omodul\|^from obase\|^import oprim\|^import oskill\|^import omodul\|^import obase" aegis-watch/ --include="*.py"
          echo "aegis-watch isolation OK."

      - name: pytest
        env:
          AEGIS_POSTGRES_DSN: postgresql://aegis:aegis@localhost:5432/aegis
        run: pytest aegis/tests/ --cov=aegis --cov-report=term-missing --cov-fail-under=89 -q --tb=short

  smoke:
    name: Smoke Tests
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"
          cache: pip

      # 私有 3O 依赖 (obase/oprim/oskill/omodul/oservice) 走 git+ssh，CI 必须
      # 注入 deploy key 才能 pip install。在仓库 Settings → Secrets 配置
      # HELIOS_DEPLOY_KEY (对 helios-plat/* 有读权限的私钥) 后此步生效。
      - name: Set up SSH for private deps
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.HELIOS_DEPLOY_KEY }}

      - name: Install dependencies
        run: pip install -e ".[smoke]"

      - name: Smoke tests (real Postgres container)
        run: RUN_SMOKE=1 pytest aegis/tests/smoke/ -v --tb=short
