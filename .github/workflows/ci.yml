name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Backend Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: aegis
          POSTGRES_PASSWORD: aegis
          POSTGRES_DB: aegis
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: pre-commit
        run: pre-commit run --all-files

      - name: ruff lint
        run: ruff check aegis/

      - name: ruff format
        run: ruff format --check aegis/

      - name: mypy
        run: mypy aegis/

      - name: pytest
        env:
          AEGIS_POSTGRES_DSN: postgresql://aegis:aegis@localhost:5432/aegis
        run: pytest aegis/tests/ --cov=aegis --cov-report=term-missing --cov-fail-under=89 -q --tb=short

  smoke:
    name: Smoke Tests
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[smoke]"

      - name: Smoke tests (real Postgres container)
        run: RUN_SMOKE=1 pytest aegis/tests/smoke/ -v --tb=short
